<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BrowserVec — 14. Advanced API</title>
<style>.bv-nav{font-size:.78rem;margin:0 0 1rem;color:#888;}.bv-nav a{color:#888;text-decoration:none;}.bv-nav a:hover{color:#1a73e8;text-decoration:underline;}body{font:14px/1.5 ui-monospace,monospace;margin:2rem;max-width:780px}pre{background:#111;color:#b9f;padding:1rem;border-radius:6px;overflow:auto}button{font:inherit;padding:.4rem .8rem;cursor:pointer}.ok{color:#5c5}.bad{color:#f55}.dim{color:#888}.hl{color:#fe9}h2{font-size:1.1rem;border-bottom:1px solid #333;padding-bottom:.25rem}</style>
</head>
<body>
<p class="bv-nav"><a href="./">&larr; All examples</a> &middot; <a href="../">Home</a></p>
<h1>14. Advanced API (M1 / M2 / M4)</h1>
<p class="dim">Explore <b>isSupported</b>, <b>stats</b>, <b>destroy</b>, dimension configuration, custom device reuse, the <b>chunkRows</b> override, <b>autoLoad: false</b>, and more.</p>

<pre id="out">ready.</pre>

<button id="run">Run advanced API demo</button>

<script type="module">
import { BrowserVec } from '../src/index.ts';

const $ = (id) => document.getElementById(id);
const out = $('out');
const log = (msg, cls = '') => (out.innerHTML += `\n${cls ? `<span class="${cls}">${msg}</span>` : msg}`);
const rand = (dim) => { const v = new Float32Array(dim); for (let i = 0; i < dim; i++) v[i] = Math.random() * 2 - 1; return v; };

$('run').onclick = async () => {
  out.textContent = '';

  // 1. isSupported()
  log(`--- 1. isSupported() ---`);
  const support = BrowserVec.isSupported();
  log(JSON.stringify(support, null, 2));
  if (!support.webgpu) log('WebGPU not available — plain sections run on CPU fallback; quantBits/ann sections will be skipped.', 'dim');

  // 2. Different dimensions
  log(`\n--- 2. Configurable dimensions ---`);
  for (const dim of [128, 384, 768, 1024]) {
    const db = await BrowserVec.create({ dimension: dim, metric: 'cosine', fallback: 'wasm' });
    const v = rand(dim);
    await db.add({ id: 'x', vector: v });
    const hits = await db.query(v, { k: 1 });
    log(`dim=${dim}: query ok, top score = ${hits[0].score.toFixed(4)}, count=${db.count}`);
    db.destroy();
  }
  log(`384, 768, 1024, 1536 are fast-pathed (specialized WGSL).`, 'dim');

  // 3. Dimension validation (mismatch error)
  log(`\n--- 3. Dimension mismatch error ---`);
  try {
    await BrowserVec.create({ dimension: 0, fallback: 'wasm' });
  } catch (e) {
    log(`dimension=0 rejected: ${e.message}`, 'ok');
  }

  // 4. Metric: cosine, dot, L2
  log(`\n--- 4. Metric comparison ---`);
  for (const metric of ['cosine', 'dot', 'l2']) {
    const db = await BrowserVec.create({ dimension: 8, metric, fallback: 'wasm' });
    const v = rand(8);
    await db.add({ id: 'x', vector: v });
    const hits = await db.query(v, { k: 1 });
    log(`metric=${metric}: score=${hits[0].score.toFixed(5)}, count=${db.count}`);
    db.destroy();
  }

  // 5. stats() with different configs
  log(`\n--- 5. stats() various configs ---`);

  const flat = await BrowserVec.create({ dimension: 64, metric: 'cosine', fallback: 'wasm' });
  await flat.addBatch([{ id: 'a', vector: rand(64) }, { id: 'b', vector: rand(64) }]);
  log(`flat store stats: ${JSON.stringify(flat.stats(), null, 2)}`, 'dim');
  flat.destroy();

  try {
    const quantDb = await BrowserVec.create({ dimension: 64, metric: 'cosine', quantBits: 8 });
    await quantDb.addBatch([{ id: 'a', vector: rand(64) }]);
    log(`quantized stats: ${JSON.stringify(quantDb.stats(), null, 2)}`, 'dim');
    quantDb.destroy();
  } catch (e) {
    log(`skipped — quantized store requires WebGPU`, 'dim');
  }

  try {
    const ivfDb = await BrowserVec.create({ dimension: 64, metric: 'cosine', ann: {} });
    await ivfDb.addBatch(Array.from({ length: 500 }, (_, i) => ({ id: `v${i}`, vector: rand(64) })));
    await ivfDb.query(rand(64), { k: 1 }); // triggers build
    log(`IVF stats: ${JSON.stringify(ivfDb.stats(), null, 2)}`, 'dim');
    ivfDb.destroy();
  } catch (e) {
    log(`skipped — IVF store requires WebGPU`, 'dim');
  }

  // 6. autoLoad: false
  log(`\n--- 6. autoLoad: false ---`);
  const name = 'advanced-example';
  let d = await BrowserVec.create({ dimension: 64, persist: { name }, fallback: 'wasm' });
  await d.addBatch([{ id: 'keep', vector: rand(64) }]);
  await d.save();
  d.destroy();

  // Without autoLoad: false, create() would auto-load. With it, we start empty.
  const empty = await BrowserVec.create({ dimension: 64, persist: { name, autoLoad: false }, fallback: 'wasm' });
  log(`autoLoad=false: count = ${empty.count} (should be 0)`, empty.count === 0 ? 'ok' : 'bad');
  empty.destroy();

  // Reload with auto-load (default) to demonstrate it works.
  const loaded = await BrowserVec.create({ dimension: 64, persist: { name }, fallback: 'wasm' });
  log(`autoLoad=true: count = ${loaded.count} (should be 1)`, loaded.count === 1 ? 'ok' : 'bad');
  loaded.destroy();

  // 7. Device reuse
  log(`\n--- 7. Device reuse ---`);
  if (!support.webgpu) {
    log(`skipped — device reuse requires WebGPU`, 'dim');
  } else {
    const adapter = await navigator.gpu.requestAdapter();
    const device = await adapter.requestDevice();
    const db1 = await BrowserVec.create({ dimension: 32, device });
    await db1.add({ id: 'a', vector: rand(32) });
    const db2 = await BrowserVec.create({ dimension: 32, device }); // same device
    log(`two stores sharing one GPU device: db1 count=${db1.count}, db2 count=${db2.count}`, 'ok');
    db1.destroy();
    db2.destroy();
  }

  // 8. Missing persist methods
  log(`\n--- 8. save() without persist config ---`);
  try {
    const noPersist = await BrowserVec.create({ dimension: 8, fallback: 'wasm' });
    await noPersist.save();
  } catch (e) {
    log(`save() without persist throws: ${e.message}`, 'ok');
  }

  // 9. Text methods without embedder
  log(`\n--- 9. queryText() without embedder ---`);
  try {
    const noEmbed = await BrowserVec.create({ dimension: 8, metric: 'cosine', fallback: 'wasm' });
    await noEmbed.queryText('hello');
  } catch (e) {
    log(`queryText() without embedder throws: ${e.message}`, 'ok');
  }

  log(`\n--- All advanced API features demonstrated ---`, 'ok');
};
</script>
</body>
</html>
