<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BrowserVec — 01. Basic flat search</title>
<style>body{font:14px/1.5 ui-monospace,monospace;margin:2rem;max-width:780px}pre{background:#111;color:#b9f;padding:1rem;border-radius:6px;overflow:auto}button{font:inherit;padding:.4rem .8rem;cursor:pointer}.ok{color:#5c5}.bad{color:#f55}.dim{color:#888}.hl{color:#fe9}h2{font-size:1.1rem;border-bottom:1px solid #333;padding-bottom:.25rem}</style>
</head>
<body>
<h1>01. Basic flat search (M1)</h1>
<p class="dim">The simplest BrowserVec store: fp32 brute-force GPU scan, CPU top-k. Demonstrates <b>create</b>, <b>addBatch</b>, <b>query</b>, and comparing GPU results against a CPU reference.</p>

<pre id="out">ready.</pre>

<p><label>vectors <input id="n" type="number" value="50000" /></label>
<label>dim <input id="dim" type="number" value="768" /></label>
<button id="run">Run flat search</button></p>

<script type="module">
import { BrowserVec } from '../src/index.ts';

const $ = (id) => document.getElementById(id);
const out = $('out');
const log = (msg, cls = '') => (out.innerHTML += `\n${cls ? `<span class="${cls}">${msg}</span>` : msg}`);
const rand = (dim) => { const v = new Float32Array(dim); for (let i = 0; i < dim; i++) v[i] = Math.random() * 2 - 1; return v; };

$('run').onclick = async () => {
  out.textContent = '';
  const startTotal = performance.now();

  // 1. Check WebGPU support
  const support = BrowserVec.isSupported();
  log(`support: ${JSON.stringify(support)}`);
  if (!support.webgpu) return log('WebGPU not available.', 'bad');

  const n = +$('n').value;
  const dim = +$('dim').value;
  const k = 10;

  // 2. Generate a random corpus
  log(`\n--- Step 1: Generate corpus (${n} x ${dim}) ---`);
  const corpus = Array.from({ length: n }, () => rand(dim));
  const query = rand(dim);
  log(`corpus ready, query vector generated`);

  // 3. Create the store
  log(`\n--- Step 2: Create store ---`);
  const db = await BrowserVec.create({ dimension: dim, metric: 'cosine' });
  log(`store: dim=${db.dimension}, metric=${db.metric}`);

  // 4. Ingest vectors
  log(`\n--- Step 3: Ingest ---`);
  let t = performance.now();
  await db.addBatch(corpus.map((v, i) => ({ id: `v${i}`, vector: v })));
  const ingestMs = performance.now() - t;
  log(`ingested ${db.count} vectors in ${ingestMs.toFixed(0)} ms (${(n / (ingestMs / 1000) / 1000).toFixed(1)}k v/s)`);

  // 5. Query the GPU
  log(`\n--- Step 4: GPU query (k=${k}) ---`);
  await db.query(query, { k }); // warm-up (compiles shaders)
  t = performance.now();
  const hits = await db.query(query, { k });
  const gpuMs = performance.now() - t;
  log(`GPU query: ${gpuMs.toFixed(3)} ms`, 'ok');
  log(`top-${k} results:`);
  for (const h of hits) log(`  ${h.id.padStart(8)}  score ${h.score.toFixed(5)}`);

  // 6. CPU reference for correctness
  log(`\n--- Step 5: CPU reference ---`);
  t = performance.now();
  const cpuRef = corpus
    .map((v, i) => {
      let dot = 0, nq = 0, nv = 0;
      for (let d = 0; d < dim; d++) { nq += query[d] * query[d]; nv += v[d] * v[d]; dot += query[d] * v[d]; }
      return { row: i, score: dot / (Math.sqrt(nq) * Math.sqrt(nv) || 1) };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, k);
  const cpuMs = performance.now() - t;
  const speedup = (cpuMs / gpuMs).toFixed(1);
  log(`CPU query: ${cpuMs.toFixed(1)} ms (speedup: ${speedup}x)`, 'dim');

  // 7. Compare results
  const gpuIds = hits.map((h) => h.id);
  const refIds = cpuRef.map((r) => `v${r.row}`);
  const overlap = gpuIds.filter((id) => refIds.includes(id)).length;
  log(`\n--- Results ---`);
  log(`recall@${k} vs CPU: ${overlap}/${k}`, overlap === k ? 'ok' : 'bad');
  log(`total time: ${(performance.now() - startTotal).toFixed(0)} ms`, 'dim');

  // 8. Stats
  const stats = db.stats();
  log(`\nstats: ${JSON.stringify(stats, null, 2)}`, 'dim');

  db.destroy();
  log(`\ndone.`, 'dim');
};
</script>
</body>
</html>
