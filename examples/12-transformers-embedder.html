<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BrowserVec — 12. Transformers.js embedder</title>
<style>body{font:14px/1.5 ui-monospace,monospace;margin:2rem;max-width:780px}pre{background:#111;color:#b9f;padding:1rem;border-radius:6px;overflow:auto}button{font:inherit;padding:.4rem .8rem;cursor:pointer}.ok{color:#5c5}.bad{color:#f55}.dim{color:#888}.hl{color:#fe9}h2{font-size:1.1rem;border-bottom:1px solid #333;padding-bottom:.25rem}</style>
</head>
<body>
<h1>12. Transformers.js embedder (M5)</h1>
<p class="dim">Real <b>semantic</b> embeddings via <code>@xenova/transformers</code>. The model (<code>all-MiniLM-L6-v2</code>, 384-dim) downloads once and is cached by the browser — later sessions run offline. The library is <b>lazy-loaded</b> (code-split) so it's never in the core bundle if you don't use it.</p>

<pre id="out">ready.</pre>

<button id="run">Run transformers embedder demo</button>

<script type="module">
import { BrowserVec, transformersEmbedder } from '../src/index.ts';

const $ = (id) => document.getElementById(id);
const out = $('out');
const log = (msg, cls = '') => (out.innerHTML += `\n${cls ? `<span class="${cls}">${msg}</span>` : msg}`);

$('run').onclick = async () => {
  out.textContent = '';
  if (!BrowserVec.isSupported().webgpu) return log('WebGPU not available.', 'bad');

  log(`Loading transformers embedder (all-MiniLM-L6-v2, 384-dim)...`);
  log(`(First load downloads ~90 MB model — subsequent loads are instant.)`, 'dim');
  log(``);

  let embedder;
  try {
    embedder = await transformersEmbedder({
      dimension: 384,
      model: 'Xenova/all-MiniLM-L6-v2',
      onProgress: (info) => {
        if (info?.status === 'progress') {
          log(`  downloading model: ${(info.loaded / (1024 * 1024)).toFixed(0)} / ${(info.total / (1024 * 1024)).toFixed(0)} MiB`, 'dim');
        }
      },
    });
    log(`embedder ready (dim=${embedder.dimension})`, 'ok');
  } catch (e) {
    log(`Failed to load transformers embedder: ${e.message}`, 'bad');
    log(`Make sure @xenova/transformers is installed: npm install @xenova/transformers`, 'bad');
    return;
  }

  const db = await BrowserVec.create({
    dimension: 384,
    metric: 'cosine',
    embedder,
  });

  // Documents with semantically related content
  const docs = [
    { id: 'd1', text: 'The cat sat on the mat and purred contentedly' },
    { id: 'd2', text: 'Dogs love to play fetch in the park with their owners' },
    { id: 'd3', text: 'WebGPU compute shaders run massively parallel operations on the GPU' },
    { id: 'd4', text: 'The capital of France is Paris, known for the Eiffel Tower' },
    { id: 'd5', text: 'Machine learning models can classify images and text' },
    { id: 'd6', text: 'Kittens are playful and enjoy chasing strings and toys' },
    { id: 'd7', text: 'Web development involves HTML, CSS, and JavaScript' },
    { id: 'd8', text: 'GPU programming enables high-performance scientific computing' },
  ];

  log(`\n--- Ingesting ${docs.length} documents ---`);
  let t = performance.now();
  await db.addTexts(docs.map((d) => ({ ...d, metadata: { text: d.text } })));
  log(`ingested ${db.count} docs in ${(performance.now() - t).toFixed(0)} ms`, 'ok');

  // Semantic queries — transformers embedder understands meaning, not just keywords
  const queries = [
    'feline pets and their behavior',
    'computer programming and web technologies',
    'graphics processing unit computation',
  ];

  log(`\n--- Semantic text queries (k=2) ---`);
  for (const q of queries) {
    const hits = await db.queryText(q, { k: 2 });
    log(`\nquery: "${q}"`);
    for (const h of hits) {
      log(`  ${h.score.toFixed(3)}  ${h.metadata?.text}`, h.score > 0.5 ? 'ok' : 'dim');
    }
  }

  // Compare with keyword-level hashingEmbedder to see the difference
  log(`\n--- Contrast with keyword embedder ---`);
  log(`The hashingEmbedder (keyword overlap) would fail on synonyms like`, 'dim');
  log(`"feline" -> "cat" or "GPU" -> "graphics processing unit".`, 'dim');
  log(`The transformers embedder understands meaning, not just word matches.`, 'ok');

  db.destroy();
  log(`\nDone. Model weights remain cached for the next session.`, 'dim');
};
</script>
</body>
</html>
